document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"901cadad-5050-4a8f-bf57-157e1b23107a\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* vietnamese */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5fd64362-eee4-4160-acab-c47a07c33246\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"47087524-5ba6-4b2b-8f1a-7996c4eb527c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"88e24c33-583f-498e-bf9e-1fffabed9b82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"5fd64362-eee4-4160-acab-c47a07c33246\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"47087524-5ba6-4b2b-8f1a-7996c4eb527c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"88e24c33-583f-498e-bf9e-1fffabed9b82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color:#1a1a1a;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ============ SHARED LEGEND is rendered inside each frame ============ -->\n\n<!-- ============ SECTION 1 · CALENDAR (month grid) ============ -->\n<div style=\"position:absolute; left:40px; top:40px; width:1560px;\">\n  <div data-drags-parent=\"1\" style=\"font:600 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.16em; text-transform:uppercase; color:#8a8275; margin-bottom:11px;\">1 · Calendar View<\u002Fdiv>\n  <div style=\"background:#fffdfb; border:1px solid rgba(0,0,0,0.09); border-radius:3px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:36px 40px 40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:32px; margin-bottom:26px; border-bottom:1px solid rgba(0,0,0,0.13); padding-bottom:22px;\">\n      <div>\n        <div style=\"font:400 36px/1 Newsreader,Georgia,serif; color:#1a1a1a;\">RTW Critical Path 2026–27<\u002Fdiv>\n        <div style=\"font:400 13.5px/1.4 'Helvetica Neue',Helvetica; color:#6f6a60; margin-top:10px;\">Jun 2026 – Dec 2027 · color-coded by category · click a category to mute · dashed = indicative<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:11px 18px; max-width:560px; justify-content:flex-end;\">\n        <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"7\">\n          <div onclick=\"{{ lg.onToggle }}\" style=\"display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none;\">\n            <span style=\"{{ lg.swatchStyle }}\"><\u002Fspan>\n            <span style=\"{{ lg.textStyle }}\">{{ lg.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:30px 30px;\">\n      <sc-for list=\"{{ calMonths }}\" as=\"m\" hint-placeholder-count=\"19\">\n        <div>\n          <div style=\"display:flex; align-items:baseline; gap:8px; margin-bottom:9px;\">\n            <span style=\"font:500 22px/1 Newsreader,Georgia,serif; color:#1a1a1a;\">{{ m.monthName }}<\u002Fspan>\n            <span style=\"font:400 14px/1 Newsreader,Georgia,serif; color:#b3ab9c;\">{{ m.yearFull }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(7,1fr);\">\n            <sc-for list=\"{{ weekdays }}\" as=\"wd\" hint-placeholder-count=\"7\">\n              <div style=\"text-align:center; padding:0 0 6px; font:600 9.5px/1 ui-monospace,Menlo,monospace; letter-spacing:.1em; color:#a8a092;\">{{ wd }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"border-top:1px solid rgba(0,0,0,0.08); border-left:1px solid rgba(0,0,0,0.08);\">\n            <sc-for list=\"{{ m.weeks }}\" as=\"w\" hint-placeholder-count=\"5\">\n              <div style=\"position:relative; height:{{ w.height }}px;\">\n                <div style=\"position:absolute; inset:0; display:grid; grid-template-columns:repeat(7,1fr);\">\n                  <sc-for list=\"{{ w.cells }}\" as=\"c\" hint-placeholder-count=\"7\">\n                    <div style=\"{{ c.cellStyle }}\"><span style=\"{{ c.numStyle }}\">{{ c.day }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"position:absolute; inset:0; pointer-events:none;\">\n                  <sc-for list=\"{{ w.bars }}\" as=\"b\" hint-placeholder-count=\"2\">\n                    <div title=\"{{ b.tip }}\" style=\"{{ b.style }}\"><span style=\"{{ b.textStyle }}\">{{ b.label }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SECTION 2 · GANTT ============ -->\n<div style=\"position:absolute; left:1660px; top:40px; width:1960px;\">\n  <div data-drags-parent=\"1\" style=\"font:600 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.16em; text-transform:uppercase; color:#8a8275; margin-bottom:11px;\">2 · Gantt Chart View<\u002Fdiv>\n  <div style=\"background:#fffdfb; border:1px solid rgba(0,0,0,0.09); border-radius:3px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:34px 38px 38px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:24px; border-bottom:1px solid rgba(0,0,0,0.13); padding-bottom:20px;\">\n      <div>\n        <div style=\"font:400 32px/1 Newsreader,Georgia,serif; color:#1a1a1a;\">Critical Path — Timeline<\u002Fdiv>\n        <div style=\"font:400 13px/1.4 'Helvetica Neue',Helvetica; color:#6f6a60; margin-top:9px;\">Grouped by category · hover a bar for detail · click a category to mute<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px 16px; max-width:760px; justify-content:flex-end;\">\n        <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"7\">\n          <div onclick=\"{{ lg.onToggle }}\" style=\"display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none;\">\n            <span style=\"{{ lg.swatchStyle }}\"><\u002Fspan>\n            <span style=\"{{ lg.textStyle }}\">{{ lg.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; height:26px; margin-left:270px;\">\n      <sc-for list=\"{{ months }}\" as=\"m\" hint-placeholder-count=\"19\">\n        <div style=\"{{ m.labelStyle }}\">{{ m.label }} <span style=\"opacity:.5;\">'{{ m.year }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;\">\n      <div style=\"position:absolute; left:270px; right:0; top:0; bottom:0; pointer-events:none;\">\n        <sc-for list=\"{{ months }}\" as=\"m\" hint-placeholder-count=\"19\">\n          <div style=\"{{ m.lineStyle }}\"><\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"{{ todayStyle }}\"><\u002Fdiv>\n        <div style=\"position:absolute; left:{{ todayPct }}%; top:-1px; transform:translateX(-50%); font:600 9px/1 ui-monospace,Menlo,monospace; letter-spacing:.12em; color:{{ accentLine }}; background:#fffdfb; padding:2px 5px;\">TODAY<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ ganttGroups }}\" as=\"g\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex; align-items:center; gap:9px; padding:15px 0 5px;\">\n          <span style=\"width:16px; height:6px; border-radius:2px; background:{{ g.color }};\"><\u002Fspan>\n          <span style=\"font:600 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.13em; text-transform:uppercase; color:#1a1a1a;\">{{ g.name }}<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ g.events }}\" as=\"ev\" hint-placeholder-count=\"4\">\n          <div style=\"position:relative; display:flex; align-items:center; height:34px;\">\n            <div style=\"width:270px; flex:0 0 270px; padding-right:16px; display:flex; align-items:center;\">\n              <span style=\"font:500 12.5px/1.25 'Helvetica Neue',Helvetica; color:#2a2722; text-wrap:pretty;\">{{ ev.name }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative; flex:1 1 auto; height:100%;\">\n              <sc-if value=\"{{ ev.isRange }}\" hint-placeholder-val=\"{{ true }}\">\n                <div title=\"{{ ev.tip }}\" style=\"{{ ev.barStyle }}\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ ev.isMilestone }}\" hint-placeholder-val=\"{{ true }}\">\n                <div title=\"{{ ev.tip }}\" style=\"{{ ev.mStyle }}\"><\u002Fdiv>\n              <\u002Fsc-if>\n              <span style=\"{{ ev.labelStyle }}\">{{ ev.dateLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ SECTION 3 · YEAR AT A GLANCE ============ -->\n<div style=\"position:absolute; left:3680px; top:40px; width:1560px;\">\n  <div data-drags-parent=\"1\" style=\"font:600 11px/1 ui-monospace,Menlo,monospace; letter-spacing:.16em; text-transform:uppercase; color:#8a8275; margin-bottom:11px;\">3 · Year at a Glance<\u002Fdiv>\n  <div style=\"background:#fffdfb; border:1px solid rgba(0,0,0,0.09); border-radius:3px; box-shadow:0 1px 4px rgba(0,0,0,.06); padding:36px 40px 40px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:32px; margin-bottom:24px; border-bottom:1px solid rgba(0,0,0,0.13); padding-bottom:22px;\">\n      <div>\n        <div style=\"font:400 36px/1 Newsreader,Georgia,serif; color:#1a1a1a;\">2026–27 at a Glance<\u002Fdiv>\n        <div style=\"font:400 13.5px/1.4 'Helvetica Neue',Helvetica; color:#6f6a60; margin-top:10px;\">Every milestone by quarter &amp; month · the SLT wall view<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:11px 18px; max-width:560px; justify-content:flex-end;\">\n        <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"7\">\n          <div onclick=\"{{ lg.onToggle }}\" style=\"display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none;\">\n            <span style=\"{{ lg.swatchStyle }}\"><\u002Fspan>\n            <span style=\"{{ lg.textStyle }}\">{{ lg.name }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ calQuarters }}\" as=\"q\" hint-placeholder-count=\"7\">\n      <div style=\"margin-bottom:22px;\">\n        <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:10px;\">\n          <span style=\"font:600 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.16em; text-transform:uppercase; color:{{ accentLine }};\">{{ q.label }}<\u002Fspan>\n          <span style=\"flex:1 1 auto; height:1px; background:rgba(0,0,0,0.1);\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px;\">\n          <sc-for list=\"{{ q.months }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div style=\"{{ m.cardStyle }}\">\n              <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:11px;\">\n                <div style=\"font:500 19px/1 Newsreader,Georgia,serif; color:#1a1a1a;\">{{ m.short }} <span style=\"color:#b3ab9c;\">'{{ m.year }}<\u002Fspan><\u002Fdiv>\n                <span style=\"{{ m.todayStyle }}\">{{ m.todayLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:6px;\">\n                <sc-for list=\"{{ m.events }}\" as=\"ev\" hint-placeholder-count=\"2\">\n                  <div title=\"{{ ev.tip }}\" style=\"{{ ev.chipStyle }}\">\n                    <div style=\"font:600 10px/1 ui-monospace,Menlo,monospace; letter-spacing:.04em; color:#8a8275; margin-bottom:4px;\">{{ ev.dateLabel }}<\u002Fdiv>\n                    <div style=\"{{ ev.chipTextStyle }}\">{{ ev.name }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ m.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font:400 12px/1 'Helvetica Neue',Helvetica; color:#cdc6b8; padding:2px 0;\">—<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;tan&quot;,&quot;blue&quot;,&quot;green&quot;,&quot;plum&quot;],&quot;default&quot;:&quot;tan&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showPartner&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { hidden: {} };\n  toggle(k){ this.setState(s => { const h = {...s.hidden}; h[k] = !h[k]; return { hidden: h }; }); }\n\n  renderVals(){\n    const MONl = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n    const MONf = ['January','February','March','April','May','June','July','August','September','October','November','December'];\n    const MON  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n    const fmt = (s,e) => {\n      const a = new Date(Date.parse(s + 'T00:00:00Z'));\n      const da = a.getUTCDate(), ma = a.getUTCMonth();\n      if(!e) return da + ' ' + MONl[ma];\n      const b = new Date(Date.parse(e + 'T00:00:00Z'));\n      const db = b.getUTCDate(), mb = b.getUTCMonth();\n      if(ma === mb) return da + '–' + db + ' ' + MONl[ma];\n      return da + ' ' + MONl[ma] + ' – ' + db + ' ' + MONl[mb];\n    };\n\n    const ACC = { tan:'oklch(0.62 0.11 60)', blue:'oklch(0.54 0.12 250)', green:'oklch(0.52 0.11 155)', plum:'oklch(0.52 0.12 320)' };\n    const accent = ACC[this.props.accent] || ACC.tan;\n    const showPartner = this.props.showPartner !== false;\n\n    // category → color + text treatment\n    const CATS = [\n      { key:'market',  name:'AllSaints Market',       color:'oklch(0.56 0.15 150)', text:'#ffffff', bold:true  },\n      { key:'prep',    name:'Market Prep',            color:'oklch(0.74 0.15 150)', text:'#173d22', bold:true  },\n      { key:'due',     name:'Wholesale Due Dates',    color:'oklch(0.66 0.17 50)',  text:'#ffffff', bold:true  },\n      { key:'design',  name:'Product / Design / Fit', color:'oklch(0.50 0.15 300)', text:'#ffffff', bold:false },\n      { key:'prod',    name:'Production / SMS',        color:'oklch(0.80 0.15 95)',  text:'#3d3210', bold:false },\n      { key:'buying',  name:'Buying / Merch',         color:'oklch(0.52 0.13 255)', text:'#ffffff', bold:false },\n      { key:'partner', name:'Partner Moments',        color:'oklch(0.72 0.11 235)', text:'#13314a', bold:true  }\n    ];\n    const CM = {}; CATS.forEach(c => CM[c.key] = c);\n\n    const EV = [\n      // AllSaints Market (green)\n      ['Q1 2027 Market','market','2026-07-13','2026-07-24',''],\n      ['Q2 2027 Market','market','2026-09-23','2026-10-06',''],\n      ['Q3 2027 Market — Core Only','market','2026-12-01','2026-12-15',''],\n      ['Q3 2027 Market — Fashion','market','2027-01-15','2027-01-30',''],\n      ['Q4 2027 Market','market','2027-03-01','2027-03-15',''],\n      ['Q1 2028 Market','market','2027-07-13','2027-07-22',''],\n      ['Q2 2028 Market','market','2027-09-21','2027-10-07',''],\n      ['Q3 2028 Market','market','2027-11-30','2027-12-09',''],\n\n      // Market Prep (light green)\n      ['Wholesale Market Prep','prep','2026-09-19','2026-09-22',''],\n\n      // Wholesale Due Dates (orange)\n      ['Made for Rack Due — Q1 27','due','2026-08-14',null,'3 wks after market close (24 Jul)'],\n      ['Nordstrom Anniversary Due','due','2026-10-21',null,'2027 Anniversary — for May 27 ship'],\n      ['Made for Rack Due — Q2 27','due','2026-10-27',null,'3 wks after market close (6 Oct)'],\n      ['Made for Rack Due — Q3 27 Core','due','2027-01-05',null,'3 wks after market close (15 Dec)'],\n      ['Made for Rack Due — Q3 27 Fashion','due','2027-02-20',null,'3 wks after market close (30 Jan)'],\n      ['Made for Rack Due — Q4 27','due','2027-04-05',null,'3 wks after market close (15 Mar)'],\n      ['Made for Rack Due — Q1 28','due','2027-08-12',null,'3 wks after market close (22 Jul)'],\n      ['Made for Rack Due — Q2 28','due','2027-10-28',null,'3 wks after market close (7 Oct)'],\n      ['Made for Rack Due — Q3 28','due','2027-12-30',null,'3 wks after market close (9 Dec)'],\n\n      // Product / Design / Fit (purple)\n      ['Proto Fittings & Comments','design','2026-06-15','2026-07-03',''],\n      ['Aaron & Katie Styling Review','design','2026-09-03','2026-09-04',''],\n      ['Design Presentation','design','2026-09-17',null,'17th or 18th Sept'],\n      ['SMS Fitting','design','2026-09-15','2026-10-09',''],\n\n      // Production / SMS (yellow)\n      ['SMS Ex-Factory — Aug Shutdown','prod','2026-08-14',null,'Before factories close'],\n      ['SMS Ex-Factory — Balance','prod','2026-08-24',null,''],\n      ['SMS Due','prod','2026-08-28',null,''],\n\n      // Buying / Merch (blue)\n      ['Buying & Design Hard Cancel Review','buying','2026-09-01','2026-09-02',''],\n      ['Buying Admin','buying','2026-09-03','2026-09-04',''],\n      ['Buy Edit & Pricing','buying','2026-09-09','2026-09-14',''],\n      ['Buying Handover to Merch','buying','2026-09-15','2026-09-16',''],\n\n      // Partner Moments (light blue, indicative)\n      ['October Prime Day','partner','2026-10-08','2026-10-11','Goal: $1M in 4 days — indicative'],\n      ['Blooms Friends & Family','partner','2026-11-06','2026-11-09','Indicative'],\n      ['Black Friday Promo','partner','2026-11-27','2026-11-30','Indicative']\n    ];\n\n    const rows = EV.filter(r => showPartner || r[1] !== 'partner').map(r => {\n      const [name, cat, s, e, note] = r;\n      const c = CM[cat];\n      const d = new Date(Date.parse(s + 'T00:00:00Z'));\n      return {\n        name, cat, color:c.color, text:c.text, bold:c.bold,\n        startISO:s, endISO:e, dateLabel:fmt(s,e),\n        off:!!this.state.hidden[cat],\n        tip: name + '  ·  ' + c.name + '  ·  ' + fmt(s,e) + (note ? '  —  ' + note : ''),\n        mi:d.getUTCMonth(), yr:d.getUTCFullYear()\n      };\n    });\n\n    const usedCats = CATS.filter(c => showPartner || c.key !== 'partner');\n    const legend = usedCats.map(c => {\n      const off = this.state.hidden[c.key];\n      return {\n        key:c.key, name:c.name,\n        onToggle:() => this.toggle(c.key),\n        swatchStyle:'width:12px; height:12px; border-radius:3px; flex:0 0 auto; background:' + c.color + ';' + (off ? ' opacity:.25;' : ''),\n        textStyle:'font:' + (c.bold ? '700' : '500') + ' 12px/1 Helvetica,Arial,sans-serif; color:' + (off ? 'rgba(26,26,26,.32)' : '#1a1a1a') + ';' + (off ? ' text-decoration:line-through;' : '')\n      };\n    });\n\n    // ---------- shared axis range: Jun 2026 → Dec 2027 ----------\n    const S = Date.UTC(2026,5,1), E = Date.UTC(2027,11,31) + 86400000, span = E - S;\n    const pct = ds => (Date.parse(ds + 'T00:00:00Z') - S) / span * 100;\n    const TODAY = { y:2026, mi:5, d:24 };\n    const todayPct = pct('2026-06-24');\n\n    // ---------- GANTT ----------\n    const months = [];\n    for(let i=0;i<19;i++){\n      const mi = (5 + i) % 12, yr = 2026 + Math.floor((5 + i) / 12);\n      const sd = new Date(Date.UTC(yr, mi, 1)), ed = new Date(Date.UTC(yr, mi + 1, 0));\n      const left = pct(sd.toISOString().slice(0,10)), mid = (left + pct(ed.toISOString().slice(0,10))) / 2;\n      const isQ = (mi % 3 === 0);\n      months.push({\n        label:MON[mi], year:String(yr).slice(2),\n        labelStyle:'position:absolute; left:' + mid + '%; transform:translateX(-50%); top:5px; white-space:nowrap; font:600 9.5px/1 ui-monospace,Menlo,monospace; letter-spacing:.06em; color:' + (isQ ? '#1a1a1a' : '#9a9286') + ';',\n        lineStyle:'position:absolute; left:' + left + '%; top:0; bottom:0; border-left:1px solid ' + (isQ ? 'rgba(0,0,0,0.13)' : 'rgba(0,0,0,0.05)') + ';'\n      });\n    }\n\n    const ganttGroups = usedCats.map(c => ({\n      key:c.key, name:c.name, color:c.color,\n      events: rows.filter(r => r.cat === c.key).map(ev => {\n        const isM = !ev.endISO, l = pct(ev.startISO), w = isM ? 0 : (pct(ev.endISO) - l);\n        const op = ev.off ? '0.14' : '1';\n        const partner = ev.cat === 'partner';\n        const barStyle = 'position:absolute; left:' + l + '%; width:' + w + '%; min-width:11px; height:13px; top:50%; transform:translateY(-50%); border-radius:4px; opacity:' + op + '; ' + (partner ? ('background:' + ev.color + '; border:1.5px dashed ' + 'oklch(0.45 0.13 235);') : ('background:' + ev.color + ';'));\n        const mStyle = 'position:absolute; left:' + l + '%; top:50%; width:13px; height:13px; transform:translate(-50%,-50%) rotate(45deg); opacity:' + op + '; background:' + ev.color + ';' + (partner ? ' border:1.5px dashed oklch(0.45 0.13 235);' : '');\n        const labelAt = isM ? l : l + w;\n        const labelBase = 'white-space:nowrap; font:500 10.5px/1 ui-monospace,Menlo,monospace; letter-spacing:.02em; color:rgba(26,26,26,' + (ev.off ? '.18' : '.5') + ');';\n        const labelStyle = labelAt > 80\n          ? 'position:absolute; left:' + l + '%; top:50%; transform:translate(calc(-100% - 14px),-50%); ' + labelBase\n          : 'position:absolute; left:' + labelAt + '%; top:50%; transform:translateY(-50%); margin-left:12px; ' + labelBase;\n        return { name:ev.name, dateLabel:ev.dateLabel, tip:ev.tip, isMilestone:isM, isRange:!isM, barStyle, mStyle, labelStyle };\n      })\n    }));\n\n    // ---------- SECTION 1 · month grid ----------\n    const DAYZONE = 19, LANEH = 15, LANEGAP = 3, BOTTOM = 6;\n    const mkGrid = (mi, yr) => {\n      const firstDow = new Date(Date.UTC(yr, mi, 1)).getUTCDay();\n      const nDays = new Date(Date.UTC(yr, mi + 1, 0)).getUTCDate();\n      const monthIdx = yr * 12 + mi;\n      const segs = [];\n      rows.forEach(ev => {\n        const sd = new Date(Date.parse(ev.startISO + 'T00:00:00Z'));\n        const ed = ev.endISO ? new Date(Date.parse(ev.endISO + 'T00:00:00Z')) : sd;\n        const sIdx = sd.getUTCFullYear() * 12 + sd.getUTCMonth();\n        const eIdx = ed.getUTCFullYear() * 12 + ed.getUTCMonth();\n        if(sIdx <= monthIdx && eIdx >= monthIdx)\n          segs.push({ ev, sDay: sIdx < monthIdx ? 1 : sd.getUTCDate(), eDay: eIdx > monthIdx ? nDays : ed.getUTCDate() });\n      });\n      segs.sort((a,b) => a.sDay - b.sDay || (b.eDay - b.sDay) - (a.eDay - a.sDay));\n      const laneEnds = [];\n      segs.forEach(sg => { let L = 0; for(; L < laneEnds.length; L++){ if(laneEnds[L] < sg.sDay) break; } sg.lane = L; laneEnds[L] = sg.eDay; });\n\n      const numWeeks = Math.ceil((firstDow + nDays) / 7);\n      const weeks = [];\n      for(let w = 0; w < numWeeks; w++){\n        const weekStart = w * 7 - firstDow + 1;\n        const cells = [];\n        for(let c = 0; c < 7; c++){\n          const day = weekStart + c, inMonth = day >= 1 && day <= nDays;\n          const isToday = inMonth && yr === TODAY.y && mi === TODAY.mi && day === TODAY.d;\n          const isWeekend = c === 0 || c === 6;\n          cells.push({\n            day: inMonth ? String(day) : '',\n            cellStyle:'border-right:1px solid rgba(0,0,0,0.08); border-bottom:1px solid rgba(0,0,0,0.08); padding:3px 4px; background:' + (!inMonth ? 'rgba(0,0,0,0.018)' : (isWeekend ? 'rgba(0,0,0,0.012)' : 'transparent')) + ';',\n            numStyle: isToday\n              ? 'display:inline-flex; align-items:center; justify-content:center; width:17px; height:17px; border-radius:50%; background:' + accent + '; color:#fffdfb; font:600 10px/1 ui-monospace,Menlo,monospace;'\n              : 'font:500 10px/1 ui-monospace,Menlo,monospace; color:' + (inMonth ? '#8a8275' : '#cfc8ba') + ';'\n          });\n        }\n        const wsegs = [];\n        segs.forEach(sg => {\n          const oS = Math.max(sg.sDay, weekStart, 1), oE = Math.min(sg.eDay, weekStart + 6, nDays);\n          if(oS > oE) return;\n          wsegs.push({ sg, colStart: oS - weekStart, colEnd: oE - weekStart, trueStart: sg.sDay >= weekStart && sg.sDay <= weekStart + 6 });\n        });\n        let maxLane = -1; wsegs.forEach(s => { if(s.sg.lane > maxLane) maxLane = s.sg.lane; });\n        const lanes = maxLane + 1;\n        const height = DAYZONE + (lanes > 0 ? lanes * (LANEH + LANEGAP) : 0) + BOTTOM;\n        const bars = wsegs.map(s => {\n          const ev = s.sg.ev;\n          const left = s.colStart / 7 * 100, wid = (s.colEnd - s.colStart + 1) / 7 * 100;\n          const top = DAYZONE + s.sg.lane * (LANEH + LANEGAP);\n          const op = ev.off ? '.2' : '1';\n          const partner = ev.cat === 'partner';\n          const base = 'position:absolute; left:calc(' + left + '% + 3px); width:calc(' + wid + '% - 6px); top:' + top + 'px; height:' + LANEH + 'px; box-sizing:border-box; display:flex; align-items:center; padding:0 6px; border-radius:3px; overflow:hidden; opacity:' + op + '; background:' + ev.color + ';' + (partner ? ' border:1px dashed oklch(0.45 0.13 235);' : '');\n          const showLabel = s.trueStart || s.colStart === 0;\n          const textStyle = 'font:' + (ev.bold ? '700' : '600') + ' 9.5px/1.05 Helvetica,Arial,sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:' + ev.text + ';';\n          return { style:base, textStyle, label: showLabel ? ev.name : '', tip: ev.tip };\n        });\n        weeks.push({ height, cells, bars });\n      }\n      return { monthName: MONf[mi], yearFull: String(yr), weeks };\n    };\n\n    const order = [];\n    for(let i=0;i<19;i++){ const mi=(5+i)%12, yr=2026+Math.floor((5+i)/12); order.push([mi,yr]); }\n    const calMonths = order.map(([mi,yr]) => mkGrid(mi, yr));\n\n    // ---------- SECTION 3 · year at a glance cards ----------\n    const accSoft = accent.replace(/\\)$/, ' / 0.12)').replace('oklch(', 'oklch(');\n    const mkCard = (mi, yr) => {\n      const evs = rows.filter(e => e.mi === mi && e.yr === yr).sort((a,b) => Date.parse(a.startISO) - Date.parse(b.startISO));\n      const isNow = mi === TODAY.mi && yr === TODAY.y;\n      return {\n        short:MONl[mi], year:String(yr).slice(2), empty: evs.length === 0,\n        cardStyle:'background:' + (isNow ? 'rgba(0,0,0,0.03)' : 'rgba(0,0,0,0.014)') + '; border:1px solid ' + (isNow ? accent : 'rgba(0,0,0,0.07)') + '; border-radius:4px; padding:14px 14px 15px; min-height:120px;',\n        todayLabel: isNow ? 'NOW' : '',\n        todayStyle: isNow ? ('font:600 9px/1 ui-monospace,Menlo,monospace; letter-spacing:.14em; color:#fffdfb; background:' + accent + '; padding:3px 6px; border-radius:2px;') : 'display:none;',\n        events: evs.map(ev => {\n          const partner = ev.cat === 'partner';\n          return {\n            name:ev.name, dateLabel:ev.dateLabel, tip:ev.tip,\n            chipStyle:'padding:7px 9px; border-radius:2px; border-left:3px solid ' + ev.color + '; background:rgba(0,0,0,0.022); opacity:' + (ev.off ? '.3' : '1') + ';' + (partner ? ' border-left-style:dashed;' : ''),\n            chipTextStyle:'font:' + (ev.bold ? '700' : '500') + ' 12px/1.3 Helvetica,Arial,sans-serif; color:#2a2722; text-wrap:pretty;'\n          };\n        })\n      };\n    };\n    const calQuarters = [\n      { label:\"Q2 '26\", mis:[[5,2026]] },\n      { label:\"Q3 '26\", mis:[[6,2026],[7,2026],[8,2026]] },\n      { label:\"Q4 '26\", mis:[[9,2026],[10,2026],[11,2026]] },\n      { label:\"Q1 '27\", mis:[[0,2027],[1,2027],[2,2027]] },\n      { label:\"Q2 '27\", mis:[[3,2027],[4,2027],[5,2027]] },\n      { label:\"Q3 '27\", mis:[[6,2027],[7,2027],[8,2027]] },\n      { label:\"Q4 '27\", mis:[[9,2027],[10,2027],[11,2027]] }\n    ].map(q => ({ label:q.label, months:q.mis.map(([mi,yr]) => mkCard(mi,yr)) }));\n\n    return {\n      legend, weekdays:['S','M','T','W','T','F','S'],\n      calMonths, months, ganttGroups, calQuarters,\n      accentLine:accent, todayPct,\n      todayStyle:'position:absolute; left:' + todayPct + '%; top:0; bottom:0; width:0; border-left:2px dotted ' + accent + ';'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
