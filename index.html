<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critical Path - Calendar View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f1efe9;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#1a1a1a;min-height:100vh}
.shell{max-width:1640px;margin:0 auto;padding:30px 36px 64px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:#8a8275;margin-bottom:6px}
.page-title{font-family:'Newsreader',serif;font-size:36px;font-weight:400;color:#1a1a1a;line-height:1.1}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.header-top-row{display:flex;align-items:center;gap:10px}
.create-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font:600 13px 'Helvetica Neue',Helvetica,Arial,sans-serif;border:1px solid rgba(0,0,0,0.15);background:#fffdfb;color:#2a2722;cursor:pointer;transition:all .12s}
.create-btn:hover{background:#f8f5ef;border-color:rgba(0,0,0,0.25)}
.create-btn svg{flex-shrink:0}
.tab-switcher{display:flex;background:#e6e1d6;padding:5px;border-radius:9px;gap:5px;align-items:center}
.tab-btn{padding:8px 18px;border-radius:6px;font:600 13px 'Helvetica Neue',Helvetica,Arial,sans-serif;border:none;cursor:pointer;transition:all .12s;background:transparent;color:#8a8275}
.tab-btn.active{background:#fffdfb;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.14)}

/* Legend */
.legend-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;border-bottom:1px solid rgba(0,0,0,0.13);padding-bottom:22px;margin-bottom:24px}
.legend-label{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;color:#a8a092;letter-spacing:.08em}
.legend-chip{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;transition:opacity .12s}
.legend-name{font-size:12px;color:#1a1a1a;transition:color .12s}
.legend-chip.muted .legend-swatch{opacity:.25}
.legend-chip.muted .legend-name{color:rgba(26,26,26,.32);text-decoration:line-through}
.legend-hint{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#a8a092;margin-left:auto}

/* Controls */
.controls-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.control-group{display:flex;align-items:center;gap:8px;font-size:12px;color:#6f6a60}
.control-group label{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#a8a092}
.accent-btn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .12s;flex-shrink:0}
.accent-btn.active{border-color:#1a1a1a}

/* ---- CALENDAR VIEW ---- */
#view-calendar{display:none}
#view-calendar.active{display:block}
.cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.month-block{background:#fffdfb;border:1px solid rgba(0,0,0,0.07);border-radius:4px;overflow:hidden}
.month-header{padding:12px 14px 8px;display:flex;align-items:baseline;gap:6px}
.month-name{font-family:'Newsreader',serif;font-size:22px;font-weight:400;color:#1a1a1a}
.month-year{font-family:'Newsreader',serif;font-size:14px;font-weight:400;color:#b3ab9c}
.weekday-row{display:grid;grid-template-columns:repeat(5,1fr);padding:0 14px}
.weekday-cell{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;text-transform:uppercase;color:#a8a092;text-align:center;padding-bottom:4px}
.month-body{padding:0 14px 14px;position:relative}
.cal-week-row{display:grid;grid-template-columns:repeat(5,1fr);position:relative;border-top:1px solid rgba(0,0,0,0.08)}
.cal-day-cell{border-right:1px solid rgba(0,0,0,0.08);padding:2px 0 0 3px}
.cal-day-cell:last-child{border-right:none}
.cal-day-cell.out-month{background:rgba(0,0,0,0.018)}
.cal-day-cell:not(.out-month){cursor:pointer}
.cal-day-cell:not(.out-month):hover{background:rgba(0,0,0,0.04)}
.day-num{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#8a8275;line-height:1;display:inline-block}
.day-num.out-month{color:#cfc8ba}
.day-num.today-num{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;color:#fff;font-weight:700;margin:-1px 0 0 -1px;line-height:1}
.cal-events-layer{position:absolute;left:14px;right:14px;top:0;pointer-events:none}
.cal-bar{position:absolute;border-radius:3px;font-family:ui-monospace,Menlo,monospace;font-size:9.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:15px;line-height:15px;padding:0 3px;pointer-events:auto;transition:opacity .12s;cursor:pointer}
.cal-bar:hover{filter:brightness(0.92)}
.cal-bar.partner-bar{background:transparent !important;border-width:1px;border-style:dashed}
.cal-bar.muted{opacity:.2}

/* ---- GANTT VIEW ---- */
#view-gantt{display:none}
#view-gantt.active{display:block}
.gantt-wrap{overflow-x:auto}
.gantt-inner{min-width:1480px;position:relative}
.gantt-axis-row{display:flex;margin-left:270px;border-bottom:1px solid rgba(0,0,0,0.13);position:relative}
.gantt-month-col{flex:1;text-align:center;font-family:ui-monospace,Menlo,monospace;font-size:9.5px;text-transform:uppercase;padding:4px 0 6px;color:#a8a092;position:relative;letter-spacing:.04em}
.gantt-month-col.quarter-start{color:#1a1a1a}
.gantt-month-col::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:rgba(0,0,0,0.07)}
.gantt-month-col.quarter-start::before{background:rgba(0,0,0,0.13)}
.gantt-today-axis{position:absolute;top:0;bottom:0;width:0;border-left:2px dotted var(--accent);pointer-events:none}
.today-flag{position:absolute;top:2px;left:4px;font-family:ui-monospace,Menlo,monospace;font-size:9px;color:var(--accent);letter-spacing:.06em;white-space:nowrap;text-transform:uppercase}
.gantt-cat-header{display:flex;align-items:center;gap:8px;padding:8px 0 6px;border-top:1px solid rgba(0,0,0,0.08);margin-top:2px}
.gantt-cat-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.gantt-cat-name{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;text-transform:uppercase;color:#6f6a60;letter-spacing:.06em}
.gantt-row{display:flex;align-items:center;height:34px;position:relative;border-top:1px solid rgba(0,0,0,0.05)}
.gantt-row-label{width:270px;flex-shrink:0;font-size:12.5px;color:#2a2722;padding-right:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.gantt-row-label:hover{color:#1a1a1a;text-decoration:underline;text-underline-offset:2px}
.gantt-plot{flex:1;position:relative;height:100%;overflow:hidden}
.gantt-gridlines{position:absolute;top:0;bottom:0;left:0;right:0;display:flex;pointer-events:none}
.gantt-grid-col{flex:1;border-left:1px solid rgba(0,0,0,0.04)}
.gantt-grid-col.quarter-start{border-left:1px solid rgba(0,0,0,0.10)}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:13px;border-radius:3px;transition:opacity .12s;cursor:pointer}
.gantt-bar:hover{filter:brightness(0.88)}
.gantt-bar.partner-bar{background:transparent !important;border-width:1px;border-style:dashed}
.gantt-bar.muted{opacity:.14}
.gantt-diamond{position:absolute;top:50%;width:13px;height:13px;transform:translateY(-50%) rotate(45deg);border-radius:2px;transition:opacity .12s;cursor:pointer}
.gantt-diamond:hover{filter:brightness(0.85)}
.gantt-diamond.muted{opacity:.14}
.gantt-date-label{position:absolute;font-family:ui-monospace,Menlo,monospace;font-size:8.5px;color:#8a8275;white-space:nowrap;top:50%;transform:translateY(-50%);pointer-events:none}
.gantt-today-plot{position:absolute;top:0;bottom:0;width:0;border-left:2px dotted var(--accent);pointer-events:none;z-index:5}

/* ---- GLANCE VIEW ---- */
#view-glance{display:none}
#view-glance.active{display:block}
.quarter-band{margin-bottom:32px}
.quarter-label-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.quarter-label{font-family:ui-monospace,Menlo,monospace;font-size:12px;text-transform:uppercase;color:var(--accent);letter-spacing:.10em;flex-shrink:0}
.quarter-rule{flex:1;height:1px;background:rgba(0,0,0,0.10)}
.month-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.month-card{border:1px solid rgba(0,0,0,0.07);border-radius:4px;min-height:120px;background:rgba(0,0,0,0.014);padding:12px}
.month-card.current-month{border-color:var(--accent);border-width:2px}
.month-card-header{display:flex;align-items:baseline;gap:6px;margin-bottom:10px}
.card-month-name{font-family:'Newsreader',serif;font-size:19px;font-weight:400;color:#1a1a1a}
.card-month-year{font-family:'Newsreader',serif;font-size:12px;font-weight:400;color:#b3ab9c}
.now-pill{font-family:ui-monospace,Menlo,monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#fff;background:var(--accent);padding:2px 7px;border-radius:9px;margin-left:auto;align-self:center}
.glance-chips{display:flex;flex-direction:column;gap:6px}
.glance-chip{border-left:3px solid transparent;background:rgba(0,0,0,0.022);padding:7px 9px;border-radius:0 3px 3px 0;cursor:pointer;transition:background .1s,opacity .12s}
.glance-chip:hover{background:rgba(0,0,0,0.05)}
.glance-chip.partner-chip{border-left-style:dashed}
.glance-chip.muted{opacity:.25}
.chip-date{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#8a8275;margin-bottom:2px}
.chip-name{font-size:12px;color:#1a1a1a}
.chip-name.bold{font-weight:700}
.empty-month{font-size:20px;color:#cfc8ba;text-align:center;padding:16px 0}

/* ---- MODAL ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,12,0.42);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fffdfb;border-radius:10px;padding:28px 32px 24px;width:540px;max-width:92vw;box-shadow:0 12px 48px rgba(0,0,0,0.22);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Newsreader',serif;font-size:26px;font-weight:400;color:#1a1a1a;margin-bottom:22px}
.form-field{margin-bottom:16px}
.form-field:last-of-type{margin-bottom:0}
.form-label{font-family:ui-monospace,Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#a8a092;display:block;margin-bottom:6px}
.form-label .optional{color:#cfc8ba;font-weight:400;text-transform:none;letter-spacing:0}
.form-input,.form-select{width:100%;padding:8px 10px;border:1px solid rgba(0,0,0,0.14);border-radius:5px;font:14px 'Helvetica Neue',Helvetica,Arial,sans-serif;color:#1a1a1a;background:#fff;outline:none;transition:border-color .12s}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, currentColor 0%, transparent 100%)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-hint{font-family:ui-monospace,Menlo,monospace;font-size:9.5px;color:#b3ab9c;margin-top:5px}
.new-cat-section{background:rgba(0,0,0,0.025);border:1px solid rgba(0,0,0,0.08);border-radius:6px;padding:14px;margin-top:10px;display:none}
.new-cat-section.visible{display:block}
.new-cat-row{display:flex;align-items:flex-end;gap:12px}
.color-preview{width:32px;height:32px;border-radius:4px;border:1px solid rgba(0,0,0,0.12);flex-shrink:0;cursor:pointer;position:relative;overflow:hidden}
.color-preview input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.form-actions{display:flex;align-items:center;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(0,0,0,0.08)}
.btn{padding:9px 20px;border-radius:5px;font:600 13px 'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:pointer;border:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(0.9)}
.btn-secondary{background:transparent;border:1px solid rgba(0,0,0,0.15);color:#2a2722}
.btn-secondary:hover{background:rgba(0,0,0,0.05)}
.btn-danger{background:transparent;border:1px solid rgba(180,50,30,0.35);color:#b4321e;margin-right:auto}
.btn-danger:hover{background:rgba(180,50,30,0.06)}
.form-error{font-size:12px;color:#b4321e;margin-top:6px;display:none}
.form-error.visible{display:block}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">RTW Critical Path Schedule · Jun 2026 – Dec 2027</div>
      <h1 class="page-title" id="page-title">Critical Path - Calendar View</h1>
    </div>
    <div class="header-right">
      <div class="header-top-row">
        <button class="create-btn" onclick="openCreateModal()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          New Event
        </button>
        <div class="tab-switcher">
          <button class="tab-btn active" data-tab="calendar">Calendar</button>
          <button class="tab-btn" data-tab="gantt">Gantt</button>
          <button class="tab-btn" data-tab="glance">Glance</button>
        </div>
      </div>
      <div class="controls-bar">
        <div class="control-group">
          <label>Accent</label>
          <button class="accent-btn active" data-accent="tan" style="background:oklch(0.62 0.11 60)" title="Tan"></button>
          <button class="accent-btn" data-accent="blue" style="background:oklch(0.54 0.12 250)" title="Blue"></button>
          <button class="accent-btn" data-accent="green" style="background:oklch(0.52 0.11 155)" title="Green"></button>
          <button class="accent-btn" data-accent="plum" style="background:oklch(0.52 0.12 320)" title="Plum"></button>
        </div>
        <div class="control-group">
          <label>Partners</label>
          <button id="toggle-partner" style="font:600 11px Helvetica;padding:4px 10px;border-radius:5px;border:1px solid rgba(0,0,0,0.15);background:#fffdfb;color:#2a2722;cursor:pointer;transition:all .12s">Show</button>
        </div>
      </div>
    </div>
  </div>
  <div class="legend-bar" id="legend-bar"></div>
  <div id="view-calendar" class="active"></div>
  <div id="view-gantt"></div>
  <div id="view-glance"></div>
</div>

<!-- Event Create / Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-el">
    <div class="modal-title" id="modal-title-el">New Event</div>
    <form id="event-form" onsubmit="saveEvent(event)">

      <div class="form-field">
        <label class="form-label" for="f-name">Event Name</label>
        <input class="form-input" id="f-name" type="text" placeholder="e.g. Q1 2027 Wholesale Market" required>
        <div class="form-error" id="err-name">Please enter a name.</div>
      </div>

      <div class="form-field">
        <label class="form-label" for="f-cat">Category</label>
        <select class="form-select" id="f-cat" onchange="handleCatChange()"></select>
        <div class="new-cat-section" id="new-cat-section">
          <div class="form-label" style="margin-bottom:10px">New Category Details</div>
          <div class="new-cat-row">
            <div class="color-preview" id="color-preview" title="Click to pick color">
              <input type="color" id="f-cat-color" value="#6b9e6b" oninput="updateColorPreview()">
            </div>
            <div style="flex:1">
              <label class="form-label" for="f-cat-name">Category Name</label>
              <input class="form-input" id="f-cat-name" type="text" placeholder="e.g. Executive Review">
            </div>
          </div>
          <div class="form-hint" style="margin-top:8px">Click the swatch to pick a color. Saved as a new category visible across all views.</div>
          <div class="form-error" id="err-new-cat">Please enter a category name.</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-start">Start Date</label>
          <input class="form-input" id="f-start" type="date" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="f-end">End Date <span class="optional">(empty = single day)</span></label>
          <input class="form-input" id="f-end" type="date">
          <div class="form-hint">Leave empty for a milestone (diamond on Gantt).</div>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="f-note">Note <span class="optional">(optional)</span></label>
        <input class="form-input" id="f-note" type="text" placeholder="e.g. 3 wks after market close">
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-danger" id="btn-delete" onclick="deleteEvent()" style="display:none">Delete Event</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Event</button>
      </div>
    </form>
  </div>
</div>

<script>
// ---- DESIGN TOKENS ----
const ACCENTS = {
  tan:  'oklch(0.62 0.11 60)',
  blue: 'oklch(0.54 0.12 250)',
  green:'oklch(0.52 0.11 155)',
  plum: 'oklch(0.52 0.12 320)'
};

// Mutable categories array — new categories can be pushed here
const CATS = [
  { key:'market',  name:'AllSaints Wholesale Market', color:'oklch(0.56 0.15 150)', text:'#ffffff', bold:true  },
  { key:'prep',    name:'Wholesale Market Prep',      color:'oklch(0.74 0.15 150)', text:'#173d22', bold:true  },
  { key:'due',     name:'Wholesale Due Dates',        color:'oklch(0.66 0.17 50)',  text:'#ffffff', bold:true  },
  { key:'design',  name:'Product / Design / Fit',     color:'oklch(0.50 0.15 300)', text:'#ffffff', bold:false },
  { key:'prod',    name:'Production / SMS',           color:'oklch(0.80 0.15 95)',  text:'#3d3210', bold:false },
  { key:'buying',  name:'Buying / Merch',             color:'oklch(0.52 0.13 255)', text:'#ffffff', bold:false },
  { key:'partner', name:'Partner Moments',            color:'oklch(0.72 0.11 235)', text:'#13314a', bold:true  }
];
const CAT = () => { const m={}; CATS.forEach(c=>m[c.key]=c); return m; };

// ---- DATASET (mutable) ----
let _idSeq = 0;
function mkId() { return String(++_idSeq); }

const EVENTS = [
  // Market
  ['Q1 2027 Wholesale Market','market','2026-07-13','2026-07-24',''],
  ['Q2 2027 Wholesale Market','market','2026-09-23','2026-10-06',''],
  ['Q3 2027 Wholesale Market — Core Only','market','2026-12-01','2026-12-15',''],
  ['Q3 2027 Wholesale Market — Fashion','market','2027-01-15','2027-01-30',''],
  ['Q4 2027 Wholesale Market','market','2027-03-01','2027-03-15',''],
  ['Q1 2028 Wholesale Market','market','2027-07-13','2027-07-22',''],
  ['Q2 2028 Wholesale Market','market','2027-09-21','2027-10-07',''],
  ['Q3 2028 Wholesale Market','market','2027-11-30','2027-12-09',''],
  // Prep
  ['Wholesale Market Prep — Q1 27','prep','2026-07-08','2026-07-10',''],
  ['Wholesale Market Prep — Q2 27','prep','2026-09-19','2026-09-22',''],
  ['Wholesale Market Prep — Q3 27 Core','prep','2026-11-26','2026-11-30',''],
  ['Wholesale Market Prep — Q3 27 Fashion','prep','2027-01-11','2027-01-14',''],
  ['Wholesale Market Prep — Q4 27','prep','2027-02-24','2027-02-28',''],
  ['Wholesale Market Prep — Q1 28','prep','2027-07-08','2027-07-10',''],
  ['Wholesale Market Prep — Q2 28','prep','2027-09-16','2027-09-18',''],
  ['Wholesale Market Prep — Q3 28','prep','2027-11-25','2027-11-27',''],
  // Due dates
  ['Made for Rack Due — Q1 27','due','2026-08-14',null,'3 wks after market close (24 Jul)'],
  ['Nordstrom Anniversary Orders Due','due','2026-10-21',null,'2027 Anniversary — for May 27 ship'],
  ['Made for Rack Due — Q2 27','due','2026-10-27',null,'3 wks after market close (6 Oct)'],
  ['Made for Rack Due — Q3 27 Core','due','2027-01-05',null,'3 wks after market close (15 Dec)'],
  ['Made for Rack Due — Q3 27 Fashion','due','2027-02-20',null,'3 wks after market close (30 Jan)'],
  ['Made for Rack Due — Q4 27','due','2027-04-05',null,'3 wks after market close (15 Mar)'],
  ['Made for Rack Due — Q1 28','due','2027-08-12',null,'3 wks after market close (22 Jul)'],
  ['Made for Rack Due — Q2 28','due','2027-10-28',null,'3 wks after market close (7 Oct)'],

function parseRaw([name, cat, s, e, note]) {
  return { id:mkId(), name, cat, s, e:e||null, note, ms:!e, sMs:dparse(s), eMs:dparse(e||s) };

// Timeline span
const S = Date.UTC(2026,5,1);
const E = Date.UTC(2027,11,31) + 86400000;
const SPAN = E - S;
function pct(iso) { return (Date.parse(iso+'T00:00:00Z') - S) / SPAN * 100; }

// TODAY (UTC)
const _now = new Date();
const TODAY_MS = Date.UTC(_now.getUTCFullYear(), _now.getUTCMonth(), _now.getUTCDate());

// ---- STATE ----
const state = { tab:'calendar', hidden:{}, accent:'tan', showPartner:true };

// ---- UTILS ----
const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_BIZ = ['M','T','W','T','F']; // Mon-Fri only (no weekends in calendar)

function dparse(iso) { return Date.parse(iso+'T00:00:00Z'); }
function dfmt(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${parseInt(d)} ${MONTHS_S[parseInt(m)-1]} ${y}`;
}
function dfmtRange(s,e) { return (!e||s===e) ? dfmt(s) : `${dfmt(s)} – ${dfmt(e)}`; }
function evTooltip(ev) {
  const catMap = CAT();
  const d = ev.ms ? dfmt(ev.s) : dfmtRange(ev.s, ev.e);
  const catName = catMap[ev.cat] ? catMap[ev.cat].name : ev.cat;
  return `${ev.name}  ·  ${catName}  ·  ${d}${ev.note ? '  —  '+ev.note : ''}`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Text color contrast for custom category colors
function autoTextColor(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#1a1a1a' : '#ffffff';
}

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'cat-'+mkId();
}

function setAccent(k) { document.documentElement.style.setProperty('--accent', ACCENTS[k]); }

function getEvs() {
  return EVENTS.filter(ev => state.showPartner || ev.cat !== 'partner');
}

// ---- PERSISTENCE ----
const STORE_KEY = 'rtw-cp-v1';
const DEFAULT_CAT_KEYS = new Set(['market','prep','due','design','prod','buying','partner']);

function saveState() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      v: 1,
      events: EVENTS.map(({id,name,cat,s,e,note}) => ({id,name,cat,s,e,note})),
      customCats: CATS.filter(c => !DEFAULT_CAT_KEYS.has(c.key)),
      prefs: { tab:state.tab, hidden:state.hidden, accent:state.accent, showPartner:state.showPartner }
    }));
  } catch(_) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    // Restore custom categories
    (data.customCats||[]).forEach(c => { if (!CATS.find(x=>x.key===c.key)) CATS.push(c); });
    // Restore events (replaces defaults with saved list)
    if (Array.isArray(data.events) && data.events.length) {
      EVENTS.length = 0;
      data.events.forEach(ev => {
        const numId = parseInt(ev.id||'0');
        if (!isNaN(numId) && numId > _idSeq) _idSeq = numId;
        EVENTS.push({
          id: ev.id||mkId(), name:ev.name, cat:ev.cat, s:ev.s, e:ev.e||null, note:ev.note||'',
          ms:!ev.e, sMs:dparse(ev.s), eMs:dparse(ev.e||ev.s)
        });
      });
    }
    // Restore prefs
    const p = data.prefs||{};
    if (['calendar','gantt','glance'].includes(p.tab)) state.tab = p.tab;
    if (p.hidden && typeof p.hidden === 'object') state.hidden = p.hidden;
    if (p.accent && ACCENTS[p.accent]) state.accent = p.accent;
    if (typeof p.showPartner === 'boolean') state.showPartner = p.showPartner;
  } catch(_) {}
}

function resetDefaults() {
  if (!confirm('Reset all events and settings to the original defaults?\nAll your changes will be lost.')) return;
  localStorage.removeItem(STORE_KEY);
  location.reload();
}

// ---- CALENDAR VIEW ----
const DAYZONE=19, LANEH=15, LANEGAP=3, BOTTOM=6;

function mkGridBiz(evs, yr, mo) {
  const nDays = new Date(yr, mo+1, 0).getDate();
  const firstDow = new Date(yr, mo, 1).getDay(); // 0=Sun..6=Sat
  // Day number of the Monday starting the first row (may be ≤ 0 = previous month)
  let firstMon = 1 + (firstDow === 0 ? -6 : 1 - firstDow);
  // If the first row's Friday is before day 1 (all out-of-month), skip it
  if (firstMon + 4 < 1) firstMon += 7;
  const numWeeks = Math.floor((nDays - firstMon) / 7) + 1;
  const moStart = Date.UTC(yr, mo, 1);
  const moEnd   = Date.UTC(yr, mo, nDays);

  const segs = [];
  evs.forEach(ev => {
    if (ev.sMs > moEnd || ev.eMs < moStart) return;
    const sDay = Math.round((ev.sMs - moStart)/86400000) + 1;
    const eDay = Math.round((ev.eMs - moStart)/86400000) + 1;
    segs.push({ ev, sDay, eDay, dur: eDay-sDay });
  });
  segs.sort((a,b) => a.sDay!==b.sDay ? a.sDay-b.sDay : b.dur-a.dur);

  const laneEnds = [];
  segs.forEach(sg => {
    let lane = 0;
    while (laneEnds[lane]!==undefined && laneEnds[lane] >= sg.sDay) lane++;
    sg.lane = lane;
    laneEnds[lane] = sg.eDay;
  });
  const maxLane = segs.reduce((m,sg) => Math.max(m,sg.lane), -1);

  const weeks = [];
  for (let w=0; w<numWeeks; w++) {
    const wMon = firstMon + w*7; // Monday of this row
    const wFri = wMon + 4;       // Friday of this row
    const bars = [];
    segs.forEach(sg => {
      // Clamp segment to Mon-Fri of this row
      const oS = Math.max(sg.sDay, wMon);
      const oE = Math.min(sg.eDay, wFri);
      if (oS > oE) return; // no overlap with this business week
      const colStart = oS - wMon; // 0-4
      const colEnd   = oE - wMon; // 0-4
      const trueStart = sg.sDay >= wMon && sg.sDay <= wFri;
      bars.push({ ev:sg.ev, lane:sg.lane, colStart, colEnd, showLabel: trueStart||colStart===0 });
    });
    const h = DAYZONE + (maxLane+1)*(LANEH+LANEGAP) + BOTTOM;
    weeks.push({
      days: Array.from({length:5}, (_,i) => {
        const d = wMon + i;
        return { d, inMonth: d>=1&&d<=nDays, isToday: Date.UTC(yr,mo,d)===TODAY_MS };
      }),
      bars,
      height: maxLane>=0 ? h : DAYZONE+BOTTOM
    });
  }
  return { weeks };
}

function renderCalendar() {
  const catMap = CAT();
  const evs = getEvs();
  const visEvs = evs.filter(ev => !state.hidden[ev.cat]);
  const months = [];
  for (let y=2026;y<=2027;y++)
    for (let m=(y===2026?5:0); m<=(y===2027?11:11); m++) months.push([y,m]);

  document.getElementById('view-calendar').innerHTML =
    `<div class="cal-grid">${months.map(([yr,mo]) => {
      const { weeks } = mkGridBiz(visEvs, yr, mo);
      return `
        <div class="month-block">
          <div class="month-header">
            <span class="month-name">${MONTHS[mo]}</span>
            <span class="month-year">'${String(yr).slice(2)}</span>
          </div>
          <div class="weekday-row">${DAYS_BIZ.map(d=>`<div class="weekday-cell">${d}</div>`).join('')}</div>
          <div class="month-body">
            ${weeks.map(week=>`
              <div class="cal-week-row" style="height:${week.height}px">
                ${week.days.map((day,di)=>{
                    const iso=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day.d).padStart(2,'0')}`;
                    return `<div class="cal-day-cell${day.inMonth?'':' out-month'}"${day.inMonth?` onclick="openCreateOnDate('${iso}')" title="New event on ${iso}"`:''}>
                    ${day.inMonth?`<span class="day-num${day.isToday?' today-num':''}"${day.isToday?' style="background:var(--accent)"':''}>${day.d}</span>`:''}
                  </div>`;
                  }).join('')}
                <div class="cal-events-layer">
                  ${week.bars.map(bar=>{
                    const cat = catMap[bar.ev.cat] || {color:'#aaa',text:'#fff',bold:false};
                    const muted = state.hidden[bar.ev.cat];
                    const isP = bar.ev.cat==='partner';
                    const top = DAYZONE + bar.lane*(LANEH+LANEGAP);
                    const lp = bar.colStart/5*100, wp = (bar.colEnd-bar.colStart+1)/5*100;
                    const tt = esc(evTooltip(bar.ev));
                    const label = bar.showLabel ? esc(bar.ev.name) : '';
                    const click = `onclick="editEvent('${bar.ev.id}')"`;
                    if (isP) return `<div class="cal-bar partner-bar${muted?' muted':''}"
                      style="left:calc(${lp}% + 3px);width:calc(${wp}% - 6px);top:${top}px;border-color:oklch(0.45 0.13 235);color:${cat.text}"
                      title="${tt}" ${click}>${label}</div>`;
                    return `<div class="cal-bar${muted?' muted':''}"
                      style="left:calc(${lp}% + 3px);width:calc(${wp}% - 6px);top:${top}px;background:${cat.color};color:${cat.text};font-weight:${cat.bold?700:600}"
                      title="${tt}" ${click}>${label}</div>`;
                  }).join('')}
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }).join('')}</div>`;
}

// ---- GANTT VIEW ----
const AXIS_MOS = [];
for (let y=2026;y<=2027;y++)
  for (let m=(y===2026?5:0); m<=(y===2027?11:11); m++) AXIS_MOS.push([y,m]);

function renderGantt() {
  const catMap = CAT();
  const evs = getEvs();
  const todayPct = (TODAY_MS - S) / SPAN * 100;
  const showToday = todayPct >= 0 && todayPct <= 100;

  const axisHTML = `
    <div style="display:flex;margin-left:270px;border-bottom:1px solid rgba(0,0,0,0.13);position:relative">
      ${showToday?`<div class="gantt-today-axis" style="left:${todayPct}%"><span class="today-flag">TODAY</span></div>`:''}
      ${AXIS_MOS.map(([y,m])=>{
        const isQ = m===0||m===3||m===6||m===9;
        return `<div class="gantt-month-col${isQ?' quarter-start':''}">${MONTHS_S[m].toUpperCase()} '${String(y).slice(2)}</div>`;
      }).join('')}
    </div>`;

  const gridLines = AXIS_MOS.map(([y,m])=>{
    const isQ = m===0||m===3||m===6||m===9;
    return `<div class="gantt-grid-col${isQ?' quarter-start':''}"></div>`;
  }).join('');

  const todayPlot = showToday ? `<div class="gantt-today-plot" style="left:${todayPct}%"></div>` : '';

  const groups = CATS
    .filter(c => state.showPartner||c.key!=='partner')
    .map(cat => ({ cat, evs: evs.filter(ev=>ev.cat===cat.key) }))
    .filter(g=>g.evs.length>0);

  const groupsHTML = groups.map(g => {
    const rows = g.evs.map(ev => {
      const muted = state.hidden[ev.cat];
      const cat = catMap[ev.cat] || {color:'#aaa',text:'#fff',bold:false};
      const isP = ev.cat==='partner';
      const tt = esc(evTooltip(ev));
      let plotEl = '';
      if (ev.ms) {
        const p = pct(ev.s);
        if (p>=0&&p<=100) plotEl = `
          <div class="gantt-diamond${muted?' muted':''}" style="left:calc(${p}% - 6.5px);background:${cat.color}"
            title="${tt}" onclick="editEvent('${ev.id}')"></div>
          <div class="gantt-date-label" style="left:calc(${p}% + 11px)">${dfmt(ev.s)}</div>`;
      } else {
        const p1=Math.max(0,pct(ev.s)), p2=Math.min(100,pct(ev.e));
        if (p2>p1) {
          const lblR = pct(ev.e) > 80;
          const ds = dfmtRange(ev.s, ev.e);
          const clsExtra = isP ? ' partner-bar' : '';
          const styleExtra = isP ? `border-color:oklch(0.45 0.13 235)` : `background:${cat.color}`;
          plotEl = `
            <div class="gantt-bar${clsExtra}${muted?' muted':''}" style="left:${p1}%;width:${p2-p1}%;${styleExtra}"
              title="${tt}" onclick="editEvent('${ev.id}')"></div>
            <div class="gantt-date-label" style="${lblR?`right:calc(${100-p1}% + 4px)`:`left:calc(${p2}% + 4px)`}">${ds}</div>`;
        }
      }
      return `
        <div class="gantt-row">
          <div class="gantt-row-label" style="font-weight:${cat.bold?700:400}" title="${tt}" onclick="editEvent('${ev.id}')">${esc(ev.name)}</div>
          <div class="gantt-plot">
            <div class="gantt-gridlines">${gridLines}</div>
            ${todayPlot}${plotEl}
          </div>
        </div>`;
    }).join('');
    return `
      <div>
        <div class="gantt-cat-header">
          <div class="gantt-cat-swatch" style="background:${g.cat.color}"></div>
          <div class="gantt-cat-name">${esc(g.cat.name)}</div>
        </div>${rows}
      </div>`;
  }).join('');

  document.getElementById('view-gantt').innerHTML = `
    <div class="gantt-wrap"><div class="gantt-inner">${axisHTML}${groupsHTML}</div></div>`;
}

function saveEvent(e) {
  e.preventDefault();
  const name  = document.getElementById('f-name').value.trim();
  const catVal = document.getElementById('f-cat').value;
  const start  = document.getElementById('f-start').value;
  const end    = document.getElementById('f-end').value.trim() || null;
  const note   = document.getElementById('f-note').value.trim();

  // Validate
  let valid = true;
  if (!name) { document.getElementById('err-name').classList.add('visible'); valid=false; }
  else { document.getElementById('err-name').classList.remove('visible'); }

  let finalCat = catVal;
  if (catVal === '__new__') {
    const newName = document.getElementById('f-cat-name').value.trim();
    if (!newName) { document.getElementById('err-new-cat').classList.add('visible'); valid=false; }
    else {
      document.getElementById('err-new-cat').classList.remove('visible');
      const hex = document.getElementById('f-cat-color').value;
      const key = slugify(newName);
      if (!CATS.find(c=>c.key===key)) {
        CATS.push({ key, name:newName, color:hex, text:autoTextColor(hex), bold:false });
      }
      finalCat = key;
    }
  }
  if (!valid) return;

  const sMs = dparse(start);
  const eMs = dparse(end||start);

  if (_editingId) {
    const idx = EVENTS.findIndex(e=>e.id===_editingId);
    if (idx>=0) {
      EVENTS[idx] = { id:_editingId, name, cat:finalCat, s:start, e:end, note, ms:!end, sMs, eMs };
    }
  } else {
    EVENTS.push({ id:mkId(), name, cat:finalCat, s:start, e:end, note, ms:!end, sMs, eMs });
  }

  closeModal();
  render();
}

function deleteEvent() {
  if (!_editingId) return;
  if (!confirm('Delete this event? This cannot be undone.')) return;
  const idx = EVENTS.findIndex(e=>e.id===_editingId);
  if (idx>=0) EVENTS.splice(idx,1);
  closeModal();
  render();
}

// ESC key closes modal
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ---- INIT ----
// Load saved state first (may override defaults for tab, accent, showPartner, hidden, events)
loadState();

// Apply accent CSS var
setAccent(state.accent);

// Sync UI controls to loaded state
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===state.tab));
document.querySelectorAll('.accent-btn').forEach(b => b.classList.toggle('active', b.dataset.accent===state.accent));
document.getElementById('toggle-partner').textContent = state.showPartner ? 'Show' : 'Hidden';

// Tab click handlers
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
    render();
  });
});

// Accent click handlers
document.querySelectorAll('.accent-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.accent = btn.dataset.accent;
    document.querySelectorAll('.accent-btn').forEach(b=>b.classList.toggle('active',b===btn));
    setAccent(state.accent);
    render();
  });
});

// Partner toggle
document.getElementById('toggle-partner').addEventListener('click', function() {
  state.showPartner = !state.showPartner;
  this.textContent = state.showPartner ? 'Show' : 'Hidden';
  render();
});

updateColorPreview();
render();
</script>
</body>
